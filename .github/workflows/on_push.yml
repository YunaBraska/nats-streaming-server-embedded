name: "On Push"

on:
  push:
    branches-ignore:
      - main
      - master
      - default

jobs:
  pipeline:
    uses: YunaBraska/YunaBraska/.github/workflows/wc_java_pipeline.yml@feature/java-workflows-spike
    with:
      ref: ${{ github.ref_name }}
      version_policy: nats-sync
      run_update: false
      run_test: true
      create_tag: false
    secrets: inherit

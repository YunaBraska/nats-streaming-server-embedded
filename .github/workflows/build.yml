name: "Build"

on:
  workflow_dispatch:
    inputs:
      run_update:
        type: boolean
        default: false
        required: false
        description: "Update wrapper and properties"
      run_test:
        type: boolean
        default: true
        required: false
        description: "Runs tests"
      create_tag:
        type: boolean
        default: false
        required: false
        description: "Create and push a release tag"
      ref:
        type: string
        required: false
        description: "[Optional] branch, tag or commit"

jobs:
  pipeline:
    uses: YunaBraska/YunaBraska/.github/workflows/wc_java_pipeline.yml@feature/java-workflows-spike
    with:
      ref: ${{ github.event.inputs.ref || github.ref || github.ref_name || github.head_ref }}
      version_policy: nats-sync
      version_sync_property: nats-streaming-server.version
      run_update: ${{ inputs.run_update }}
      run_test: ${{ inputs.run_test }}
      create_tag: ${{ inputs.create_tag }}
    secrets: inherit
